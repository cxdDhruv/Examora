name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_AUTH_DOMAIN: "examora-ebccb.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "examora-ebccb"
          VITE_FIREBASE_STORAGE_BUCKET: "examora-ebccb.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "85979298463"
          VITE_FIREBASE_APP_ID: "1:85979298463:web:178662364d10d7587080aa"
          VITE_FIREBASE_MEASUREMENT_ID: "G-Z9SJHXRBFN"
          # User must add this secret in Repo Settings -> Secrets
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }} 
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
